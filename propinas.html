<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cordova - Liquidacion de Propinas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
  :root {
    --espresso: #241a12;
    --espresso-light: #3d2c1c;
    --wood: #b06a34;
    --wood-dark: #8a4f24;
    --cream: #f3e8d2;
    --bg: #faf6ef;
    --card-bg: #ffffff;
    --border: #e8ddc9;
    --text: #2b2016;
    --text-light: #7a6a58;
    --danger: #a13d2c;
    --success: #3f7d43;
  }
  * { box-sizing: border-box; }
  body {
    margin:0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; color: var(--text);
    background-color: var(--bg);
    background-image:
      repeating-radial-gradient(circle at 20% 30%, rgba(139,109,68,.05) 0px, rgba(139,109,68,.05) 1px, transparent 1px, transparent 3px),
      repeating-radial-gradient(circle at 70% 80%, rgba(139,109,68,.04) 0px, rgba(139,109,68,.04) 1px, transparent 1px, transparent 4px);
  }
  #layout { display:flex; min-height:100vh; }
  #sidebar {
    width:250px; color:#fff; flex-shrink:0; padding:0 0 20px 0;
    background-color: var(--espresso);
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 2px, transparent 2px, transparent 9px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,.12) 0px, rgba(0,0,0,.12) 2px, transparent 2px, transparent 9px),
      radial-gradient(ellipse at top, rgba(255,255,255,.05), transparent 60%);
    box-shadow: 3px 0 14px rgba(0,0,0,.25);
    position:relative; z-index:2;
  }
  .brand { padding:26px 20px 20px 20px; border-bottom:1px solid rgba(255,255,255,.12); text-align:center; }
  .brand img.logo { width:118px; height:118px; display:block; margin:0 auto 10px auto; filter: drop-shadow(0 3px 8px rgba(0,0,0,.4)); }
  .brand .name { font-size:20px; font-weight:800; letter-spacing:2px; color: var(--cream); }
  .brand .sub { font-size:10.5px; color: var(--wood); text-transform:uppercase; letter-spacing:1.5px; margin-top:2px; }
  .brand .tool { font-size:11.5px; color: rgba(255,255,255,.6); margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.1); }
  .nav-item { display:block; padding:13px 20px; color:#e9ddc9; text-decoration:none; cursor:pointer; font-size:14px; border-left:3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,.06); }
  .nav-item.active { background: rgba(176,106,52,.18); border-left-color: var(--wood); color:#fff; font-weight:600; }
  #main { flex:1; padding:28px 36px; max-width:1180px; }
  h2.page-title { margin:0 0 4px 0; color:var(--espresso); font-size:23px; }
  .subtitle { color:var(--text-light); margin:0 0 22px 0; font-size:13.5px; }
  .card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:20px 22px; margin-bottom:18px; box-shadow:0 1px 3px rgba(43,32,22,.05); }
  .cards-row { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:20px; }
  .stat-card { flex:1; min-width:160px; background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .stat-card .label { font-size:11.5px; color:var(--text-light); text-transform:uppercase; letter-spacing:.4px; }
  .stat-card .value { font-size:21px; font-weight:800; color:var(--espresso); margin-top:6px; }
  .stat-card.accent .value { color: var(--wood-dark); }
  table { width:100%; border-collapse: collapse; font-size:13.5px; }
  th, td { padding:10px 10px; border-bottom:1px solid var(--border); text-align:left; }
  th { background:#f6f0e4; color:var(--espresso); font-weight:700; position:sticky; top:0; }
  tr:hover td { background:#fbf8f2; }
  .table-wrap { max-height:480px; overflow:auto; border:1px solid var(--border); border-radius:10px; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width:100%; padding:9px 10px; border:1.5px solid #e2d5bd; border-radius:7px; font-size:13.5px; font-family:inherit; background:#fff;
  }
  input:focus, select:focus { outline:none; border-color: var(--wood); }
  label { font-size:12px; color:var(--text-light); font-weight:700; display:block; margin-bottom:4px; }
  .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(170px,1fr)); gap:12px; align-items:end; }
  button { cursor:pointer; border:none; border-radius:8px; padding:10px 18px; font-size:13.5px; font-weight:700; }
  .btn-primary { background: var(--wood); color:#fff; }
  .btn-primary:hover { background: var(--wood-dark); }
  .btn-dark { background: var(--espresso); color: var(--cream); }
  .btn-dark:hover { background: var(--espresso-light); }
  .btn-danger { background:#fbeae6; color: var(--danger); padding:5px 10px; font-size:12px; }
  .btn-danger:hover { background:#f4d3cb; }
  .btn-ghost { background:transparent; border:1.5px solid var(--border); color:var(--text); }
  .btn-ghost:hover { background:#f6f0e4; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
  .pill { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11.5px; font-weight:700; }
  .pill.ok { background:#e6f3e7; color:var(--success); }
  .pill.warn { background:#f7ecd8; color:#8a5a12; }
  .pill.off { background:#f1f1f1; color:#888; }
  .toast { position:fixed; bottom:22px; right:22px; background:var(--espresso); color:var(--cream); padding:12px 20px; border-radius:8px; font-size:13.5px; box-shadow:0 4px 14px rgba(0,0,0,.25); opacity:0; transform:translateY(10px); transition:.25s; pointer-events:none; z-index:999;}
  .toast.show { opacity:1; transform:translateY(0); }
  .top-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .muted { color:var(--text-light); font-size:12.5px; }
  .badge-week { background:#f6f0e4; border:1.5px solid #e2d5bd; color:var(--espresso); padding:9px 16px; border-radius:8px; font-weight:700; font-size:14px; display:inline-block; }
  .empty-state { text-align:center; padding:44px 20px; color:var(--text-light); }
  .steps { display:flex; gap:6px; margin-bottom:24px; }
  .step-dot { flex:1; text-align:center; padding:10px 6px; border-radius:8px; background:#f1e9d9; color:#8a7a63; font-size:12.5px; font-weight:700; border-bottom:3px solid transparent; }
  .step-dot.active { background:#fbeedb; color:var(--wood-dark); border-bottom-color: var(--wood); }
  .step-dot.done { background:#e6f3e7; color:var(--success); }
  .wizard-actions { display:flex; justify-content:space-between; margin-top:22px; }
  .hero { background: linear-gradient(135deg, var(--espresso), var(--espresso-light)); color:#fff; border-radius:14px; padding:28px 30px; margin-bottom:22px; }
  .hero h3 { margin:0 0 6px 0; font-size:19px; color:var(--cream); }
  .hero p { margin:0 0 16px 0; color:rgba(255,255,255,.75); font-size:13.5px; max-width:560px; }
  #loginScreen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background-color: var(--espresso);
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 2px, transparent 2px, transparent 9px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,.12) 0px, rgba(0,0,0,.12) 2px, transparent 2px, transparent 9px);
  }
  .login-card { background:#fff; border-radius:16px; padding:38px 34px; width:340px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.35); }
  .login-card h2 { color:var(--espresso); margin:6px 0 2px 0; font-size:19px; }
  .login-logo { width:110px; height:110px; margin:0 auto 10px auto; display:block; }
  .login-card input { text-align:center; font-size:15px; margin-top:14px; }
  .sede-badge { display:inline-block; margin-top:8px; padding:3px 12px; border-radius:20px; background:rgba(176,106,52,.25); color:var(--cream); font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
  @media print {
    #sidebar, .no-print, #loginScreen { display:none !important; }
    #main { padding:0; max-width:100%; }
    body { background:#fff; background-image:none; }
    .table-wrap { max-height:none !important; overflow:visible !important; border:none !important; box-shadow:none !important; }
    .card { box-shadow:none !important; border:1px solid #ccc !important; }
    table { font-size:11.5px; }
    thead { display:table-header-group; }
    tr { break-inside:avoid; }
    .print-title { display:block !important; }
  }
</style>
</head>

<div id="fb-login-overlay" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background-color:var(--espresso);position:fixed;inset:0;z-index:999;">
  <form id="fb-login-form" class="login-card" style="width:340px;">

    <div id="fb-login-error" style="color:#c0392b;font-size:13px;margin-top:10px;min-height:14px;"></div>
    <button id="fb-login-btn" type="submit" class="btn-primary" style="width:100%;margin-top:10px">Entrar</button>
  </form>
</div>

// ---------- Semana Lunes-Domingo ----------
function fmtDate(d){ return d.toISOString().slice(0,10); }
function mondayOf(d){
  const x = new Date(d); const day = (x.getDay()+6)%7;
  x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x;
}
function weekRangeFromDate(dateStr){
  const base = dateStr ? new Date(dateStr+'T00:00:00') : new Date();
  if (SEDE === 'chinu'){
    const y = base.getFullYear(), m = base.getMonth(), day = base.getDate();
    if (day <= 15){
      return { inicio: fmtDate(new Date(y,m,1)), fin: fmtDate(new Date(y,m,15)) };
    } else {
      const lastDay = new Date(y, m+1, 0).getDate();
      return { inicio: fmtDate(new Date(y,m,16)), fin: fmtDate(new Date(y,m,lastDay)) };
    }
  }
  const mon = mondayOf(base);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return { inicio: fmtDate(mon), fin: fmtDate(sun) };
}
function periodoAnteriorRange(dateStr){
  const base = dateStr ? new Date(dateStr+'T00:00:00') : new Date();
  if (SEDE === 'chinu'){
    const y = base.getFullYear(), m = base.getMonth(), day = base.getDate();
    if (day <= 15){
      // quincena anterior: 16-fin del mes previo
      const prevMonth = new Date(y, m-1, 1);
      const py = prevMonth.getFullYear(), pm = prevMonth.getMonth();
      const lastDay = new Date(py, pm+1, 0).getDate();
      return { inicio: fmtDate(new Date(py,pm,16)), fin: fmtDate(new Date(py,pm,lastDay)) };
    } else {
      return { inicio: fmtDate(new Date(y,m,1)), fin: fmtDate(new Date(y,m,15)) };
    }
  }
  const anterior = new Date(base); anterior.setDate(anterior.getDate()-7);
  return weekRangeFromDate(fmtDate(anterior));
}
function labelFromRange(inicio, fin){
  const opts = {day:'2-digit', month:'short'};
  const di = new Date(inicio+'T00:00:00'); const df = new Date(fin+'T00:00:00');
  const cap = s => s.charAt(0).toUpperCase()+s.slice(1);
  return `${cap(di.toLocaleDateString('es-CO',opts))} - ${cap(df.toLocaleDateString('es-CO',opts))} ${df.getFullYear()}`;
}
function findOrCreateWeek(inicio, fin){
  let w = DB.weeks.find(w=>w.inicio===inicio && w.fin===fin);
  if (!w){
    w = { id: uid('w'), label: labelFromRange(inicio,fin), inicio, fin, estado:'Abierta', propinaGeneral: 0,
          declaracion: { d1:false, d2:false, d3:false },
          participantes: activeEmployees().map(e=>e.nombre) };
    DB.weeks.push(w);
    saveDB();
  }
  if (!w.declaracion) w.declaracion = { d1:false, d2:false, d3:false };
  if (!w.participantes) w.participantes = activeEmployees().map(e=>e.nombre);
  return w;
}
function weekParticipantes(week){
  return (week && week.participantes) ? week.participantes : activeEmployees().map(e=>e.nombre);
}

// ---------- Calculo de liquidacion ----------
function calcSemana(label){
  const week = DB.weeks.find(w=>w.label===label);
  const propinaGeneral = week ? Number(week.propinaGeneral)||0 : 0;
  const menaje = propinaGeneral * 0.10;
  const ajustesSemana = DB.ajustes.filter(a=>a.semana===label);
  const ajustesTotal = ajustesSemana.reduce((s,a)=>s+(Number(a.valorResultante)||0),0);
  const totalDistribuir = propinaGeneral - menaje - ajustesTotal;
  const participantes = weekParticipantes(week);
  const nActivos = participantes.length;
  const empleadosConAjuste = new Set(ajustesSemana.map(a=>a.empleado));
  const nReparto = Math.max(nActivos - empleadosConAjuste.size, 0);
  const cu = nReparto>0 ? totalDistribuir/nReparto : 0;
  const detalle = participantes.map(nombre=>{
    const ajuste = ajustesSemana.find(a=>a.empleado===nombre);
    const base = ajuste ? (Number(ajuste.valorResultante)||0) : cu;
    const descuentos = DB.descuentos.filter(d=>d.semana===label && d.empleado===nombre)
      .reduce((s,d)=>s+(Number(d.valor)||0),0);
    return { nombre, base, descuentos, total: base-descuentos, tieneAjuste: !!ajuste };
  });
  return { propinaGeneral, menaje, ajustesTotal, totalDistribuir, nActivos, nReparto, cu, detalle };
}

function calcCuBase(label){
  // Propina "de referencia" para una semana completa, sin restar ajustes especiales.
  // Sirve de base para prorratear por dia/hora o calcular porcentajes en el Paso 3,
  // evitando el problema de que el ajuste dependa de si mismo.
  const week = DB.weeks.find(w=>w.label===label);
  const propinaGeneral = week ? Number(week.propinaGeneral)||0 : 0;
  const menaje = propinaGeneral * 0.10;
  const nActivos = weekParticipantes(week).length;
  return nActivos>0 ? (propinaGeneral-menaje)/nActivos : 0;
}

function cerrarSemana(label){
  const calc = calcSemana(label);
  DB.historialNuevo = DB.historialNuevo.filter(h=>h.semana!==label);
  const week = DB.weeks.find(w=>w.label===label);
  const hoy = fmtDate(new Date());
  calc.detalle.forEach(d=>{
    DB.historialNuevo.push({
      semana: label, inicio: week?week.inicio:'', fin: week?week.fin:'',
      empleado: d.nombre, propinaBase: d.base, descuentos: d.descuentos, total: d.total,
      fechaCierre: hoy
    });
  });
  if (week) week.estado = 'Cerrada';
  saveDB();
}

function comprobacionFinalHtml(calc, label){
  // Identidad contable: Propina General = 10% Menaje + Total Descuentos + Total Pagado a empleados.
  // Los Ajustes Especiales NO se suman aparte: ya estan incluidos dentro de "Total Pagado"
  // (son la "Propina Base" de quienes tienen ajuste, en vez del C/U estandar).
  const totalPagado = calc.detalle.reduce((s,d)=>s+d.total,0);
  const totalDescuentos = calc.detalle.reduce((s,d)=>s+d.descuentos,0);
  const sumaPartes = calc.menaje + totalDescuentos + totalPagado;
  const diferencia = calc.propinaGeneral - sumaPartes;
  const cuadra = Math.abs(diferencia) < 1;
  return `
    <div class="card" style="${cuadra ? 'border-color:#bfe0c2' : 'border-color:#eab7ab;background:#fbeae6'}">
      <h3 style="margin-top:0;color:var(--espresso)">Comprobacion final</h3>
      <table>
        <tr><td>Propina General</td><td style="text-align:right">${money(calc.propinaGeneral)}</td></tr>
        <tr><td>(-) 10% Menaje</td><td style="text-align:right">${money(calc.menaje)}</td></tr>
        <tr><td>(-) Total Descuentos (de la propina de cada empleado)</td><td style="text-align:right">${money(totalDescuentos)}</td></tr>
        <tr style="font-weight:800"><td>= Total efectivamente pagado a empleados</td><td style="text-align:right">${money(totalPagado)}</td></tr>
        <tr><td class="muted">De ese total, ${money(calc.ajustesTotal)} corresponden a ${DB.ajustes.filter(a=>a.semana===label).length} ajuste(s) especiale(s) (ya incluidos arriba, no se suman aparte)</td><td></td></tr>
        <tr style="font-weight:800;border-top:2px solid ${cuadra?'var(--success)':'var(--danger)'}">
          <td>${cuadra ? 'Cuadra perfecto: Menaje + Descuentos + Total Pagado = Propina General' : 'NO CUADRA - diferencia sin explicar'}</td>
          <td style="text-align:right;color:${cuadra?'var(--success)':'var(--danger)'}">${cuadra ? 'Diferencia: $0' : 'Diferencia: '+money(diferencia)}</td>
        </tr>
      </table>
    </div>
  `;
}

function updateDescuentoSugerencia(){
  const box = document.getElementById('descuentoSugerencia');
  if (!box) return;
  const empleado = document.getElementById('dEmpleado').value;
  const codigo = document.getElementById('dCodigo').value;
  const code = DB.codes.find(c=>c.codigo===codigo);
  if (!code || !empleado){ box.innerHTML=''; return; }
  const week = DB.weeks.find(w=>w.label===wizardWeekLabel);
  if (code.tipo==='Porcentaje' || code.tipo==='Mixto'){
    const calc = calcSemana(week.label);
    const emp = calc.detalle.find(d=>d.nombre===empleado);
    const base = emp ? emp.base : 0;
    const sugerido = Math.round((code.porcentaje/100) * base);
    box.innerHTML = `Sugerencia: ${code.porcentaje}% de ${money(base)} (propina base de ${esc(empleado)}) = <strong>${money(sugerido)}</strong> &nbsp;<button class="btn-ghost" type="button" id="btnUsarSugerido" data-val="${sugerido}">Usar este valor</button>${code.tipo==='Mixto' ? ` <span>+ ${esc(code.letra)} (${esc(code.letraSignificado)}, valor adicional manual)</span>`:''}`;
  } else if (code.tipo==='Segun'){
    box.innerHTML = `Este codigo se calcula <strong>${esc(code.letra)} - ${esc(code.letraSignificado)}</strong>: no tiene porcentaje fijo, escribe el valor manual segun el caso.`;
  } else {
    box.innerHTML = '';
  }
}

function diasEnPeriodo(label){
  const week = DB.weeks.find(w=>w.label===label);
  if (!week) return 7;
  const di = new Date(week.inicio+'T00:00:00');
  const df = new Date(week.fin+'T00:00:00');
  return Math.round((df-di)/(1000*60*60*24)) + 1;
}
function updateAjusteCalculo(){
  const box = document.getElementById('aCalcBox');
  if (!box) return;
  const tipo = document.getElementById('aTipo').value;
  const cuBase = calcCuBase(wizardWeekLabel);
  if (tipo === '% de propina propia'){
    box.innerHTML = `
      <label>Porcentaje (%)</label>
      <input type="number" id="aPorcentaje" placeholder="Ej: 30">
      <button class="btn-ghost" type="button" id="btnCalcPct" style="margin-top:10px">Calcular sugerido</button>
      <div id="aResultado" class="muted" style="margin-top:8px"></div>
    `;
  } else if (tipo === 'Dias trabajados (prorrateo)'){
    const nDias = diasEnPeriodo(wizardWeekLabel);
    const valorDia = cuBase/nDias;
    box.innerHTML = `
      <p class="muted" style="margin-top:0">Valor diario de propina esta ${pwLower()}: <strong>${money(valorDia)}</strong> (propina completa / ${nDias} dias)</p>
      <label>Dias trabajados</label>
      <input type="number" id="aDias" min="0" max="${nDias}" placeholder="Ej: 1">
      <button class="btn-ghost" type="button" id="btnCalcDias" style="margin-top:10px">Calcular sugerido</button>
      <div id="aResultado" class="muted" style="margin-top:8px"></div>
    `;
  } else if (tipo === 'Horas trabajadas (prorrateo)'){
    box.innerHTML = `
      <div class="form-grid">
        <div class="field"><label>Horas estandar por dia</label><input type="number" id="aHorasEstandar" value="8"></div>
        <div class="field"><label>Horas trabajadas</label><input type="number" id="aHoras" placeholder="Ej: 4"></div>
      </div>
      <div id="aHorasInfo" class="muted" style="margin-top:8px"></div>
      <button class="btn-ghost" type="button" id="btnCalcHoras" style="margin-top:10px">Calcular sugerido</button>
      <div id="aResultado" class="muted" style="margin-top:8px"></div>
    `;
    updateHorasInfo();
  } else {
    box.innerHTML = `<p class="muted" style="margin:0">Este tipo no tiene calculo automatico: escribe directamente el valor final a pagar.</p>`;
  }
}
function updateHorasInfo(){
  const info = document.getElementById('aHorasInfo');
  if (!info) return;
  const cuBase = calcCuBase(wizardWeekLabel);
  const horasEst = Number(document.getElementById('aHorasEstandar').value)||8;
  const nDias = diasEnPeriodo(wizardWeekLabel);
  const valorDia = cuBase/nDias;
  const valorHora = horasEst>0 ? valorDia/horasEst : 0;
  info.innerHTML = `Valor diario: ${money(valorDia)} &nbsp;|&nbsp; Valor por hora: ${money(valorHora)} (sobre ${nDias} dias del periodo)`;
}

function attachHandlers(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.onclick = ()=>{ currentTab = el.dataset.tab; if(currentTab==='wizard'){ wizardStep=1; } render(); window.scrollTo(0,0); };
  });

  // ---- Inicio ----
  const btnIrWizard = document.getElementById('btnIrWizard');
  if (btnIrWizard) btnIrWizard.onclick = ()=>{ currentTab='wizard'; wizardStep=1; wizardWeekLabel=null; render(); };

  // ---- Wizard navegacion por puntos ----
  document.querySelectorAll('[data-goto-step]').forEach(el=>{
    el.onclick = ()=>{ const n = Number(el.dataset.gotoStep); if(n<wizardStep || n===wizardStep+1 || n<=wizardStep){ wizardStep=n; render(); } };
  });

  // ---- Paso 1 ----
  const btnSemanaActual = document.getElementById('btnSemanaActual');
  if (btnSemanaActual) btnSemanaActual.onclick = ()=>{
    const r = semanaActualRange();
    const w = findOrCreateWeek(r.inicio, r.fin);
    wizardWeekLabel = w.label; render();
  };
  const btnSemanaPasada = document.getElementById('btnSemanaPasada');
  if (btnSemanaPasada) btnSemanaPasada.onclick = ()=>{
    const r = periodoAnteriorRange(fmtDate(new Date()));
    const w = findOrCreateWeek(r.inicio, r.fin);
    wizardWeekLabel = w.label; render();
  };
  const wFechaBase = document.getElementById('wFechaBase');
  if (wFechaBase) wFechaBase.onchange = ()=>{
    const r = weekRangeFromDate(wFechaBase.value);
    const w = findOrCreateWeek(r.inicio, r.fin);
    wizardWeekLabel = w.label; render();
  };
  const wSelectOtraSemana = document.getElementById('wSelectOtraSemana');
  if (wSelectOtraSemana) wSelectOtraSemana.onchange = ()=>{
    if (wSelectOtraSemana.value){ wizardWeekLabel = wSelectOtraSemana.value; render(); }
  };
  const btnStep1Next = document.getElementById('btnStep1Next');
  if (btnStep1Next) btnStep1Next.onclick = ()=>{
    const week = DB.weeks.find(w=>w.label===wizardWeekLabel);
    week.propinaGeneral = Number(document.getElementById('wPropinaGeneral').value)||0;
    saveDB(); wizardStep=2; render();
  };
  document.querySelectorAll('[data-part-nombre]').forEach(el=>{
    el.onchange = ()=>{
      const week = DB.weeks.find(w=>w.label===wizardWeekLabel);
      let set = new Set(weekParticipantes(week));
      if (el.checked) set.add(el.dataset.partNombre); else set.delete(el.dataset.partNombre);
      week.participantes = [...set];
      saveDB();
      const contador = document.getElementById('participantesContador');
      const total = DB.employees.filter(e=>e.nombre.trim()!=='').length;
      if (contador) contador.textContent = `${set.size} de ${total} seleccionados`;
    };
  });
  const btnMarcarActivos = document.getElementById('btnMarcarActivos');
  if (btnMarcarActivos) btnMarcarActivos.onclick = ()=>{
    const week = DB.weeks.find(w=>w.label===wizardWeekLabel);
    week.participantes = activeEmployees().map(e=>e.nombre);
    saveDB(); render();
  };
  const btnMarcarTodos = document.getElementById('btnMarcarTodos');
  if (btnMarcarTodos) btnMarcarTodos.onclick = ()=>{
    const week = DB.weeks.find(w=>w.label===wizardWeekLabel);
    week.participantes = DB.employees.filter(e=>e.nombre.trim()!=='').map(e=>e.nombre);
    saveDB(); render();
  };

  // ---- Paso 2 ----
  const dEmpleado = document.getElementById('dEmpleado');
  const dCodigo = document.getElementById('dCodigo');
  if (dEmpleado) dEmpleado.onchange = updateDescuentoSugerencia;
  if (dCodigo) dCodigo.onchange = updateDescuentoSugerencia;
  if (dEmpleado && dCodigo) updateDescuentoSugerencia();
  const btnAddDescuento = document.getElementById('btnAddDescuento');
  if (btnAddDescuento) btnAddDescuento.onclick = ()=>{
    const empleado = document.getElementById('dEmpleado').value;
    const codigo = document.getElementById('dCodigo').value;
    const detalle = document.getElementById('dDetalle').value.trim();
    const valor = Number(document.getElementById('dValor').value)||0;
    if (!empleado || !valor){ toast('Falta empleado o valor'); return; }
    DB.descuentos.push({id:uid('d'), semana:wizardWeekLabel, empleado, codigo, detalle, valor, tipo:'Nuevo (detallado)'});
    saveDB(); toast('Descuento agregado'); render();
  };
  document.querySelectorAll('[data-del-desc]').forEach(b=>{
    b.onclick = ()=>{ if(!confirm('Eliminar este descuento?')) return; DB.descuentos = DB.descuentos.filter(d=>d.id!==b.dataset.delDesc); saveDB(); render(); };
  });
  const btnStep2Back = document.getElementById('btnStep2Back');
  if (btnStep2Back) btnStep2Back.onclick = ()=>{ wizardStep=1; render(); };
  const btnStep2Next = document.getElementById('btnStep2Next');
  if (btnStep2Next) btnStep2Next.onclick = ()=>{ wizardStep=3; render(); };

  // ---- Paso 3 ----
  const aTipo = document.getElementById('aTipo');
  if (aTipo){ aTipo.onchange = updateAjusteCalculo; updateAjusteCalculo(); }
  const btnAddAjuste = document.getElementById('btnAddAjuste');
  if (btnAddAjuste) btnAddAjuste.onclick = ()=>{
    const empleado = document.getElementById('aEmpleado').value;
    const tipo = document.getElementById('aTipo').value;
    const valorResultante = Number(document.getElementById('aValor').value)||0;
    const observacion = document.getElementById('aObs').value.trim();
    if (!empleado){ toast('Falta empleado'); return; }
    DB.ajustes.push({id:uid('a'), semana:wizardWeekLabel, empleado, tipo, parametro:'', valorResultante, observacion});
    saveDB(); toast('Ajuste agregado'); render();
  };
  document.querySelectorAll('[data-del-ajuste]').forEach(b=>{
    b.onclick = ()=>{ if(!confirm('Eliminar este ajuste?')) return; DB.ajustes = DB.ajustes.filter(a=>a.id!==b.dataset.delAjuste); saveDB(); render(); };
  });
  const btnStep3Back = document.getElementById('btnStep3Back');
  if (btnStep3Back) btnStep3Back.onclick = ()=>{ wizardStep=2; render(); };
  const btnStep3Next = document.getElementById('btnStep3Next');
  if (btnStep3Next) btnStep3Next.onclick = ()=>{ wizardStep=4; render(); };

  // ---- Paso 4 ----
  const btnStep4Back = document.getElementById('btnStep4Back');
  if (btnStep4Back) btnStep4Back.onclick = ()=>{ wizardStep=3; render(); };
  document.querySelectorAll('[data-decl]').forEach(el=>{
    el.onchange = ()=>{
      const week = DB.weeks.find(w=>w.label===wizardWeekLabel);
      if (!week.declaracion) week.declaracion = {d1:false,d2:false,d3:false};
      week.declaracion[el.dataset.decl] = el.checked;
      saveDB(); render();
    };
  });
  const btnCerrarSemana = document.getElementById('btnCerrarSemana');
  if (btnCerrarSemana) btnCerrarSemana.onclick = ()=>{
    const calc = calcSemana(wizardWeekLabel);
    if (calc.propinaGeneral<=0){ alert('No puedes cerrar: falta la Propina General (Paso 1).'); return; }
    const negativos = calc.detalle.filter(d=>d.total<0);
    if (negativos.length && !confirm(`${negativos.length} persona(s) quedarian con total negativo. Deseas cerrar de todas formas?`)) return;
    cerrarSemana(wizardWeekLabel);
    exportBackup();
    toast('Semana cerrada y respaldo descargado');
    render();
  };
  const btnExportExcelSemana = document.getElementById('btnExportExcelSemana');
  if (btnExportExcelSemana) btnExportExcelSemana.onclick = ()=> exportWeekExcel(wizardWeekLabel);

  // ---- Historial ----
  document.querySelectorAll('[data-export-week]').forEach(b=>{
    b.onclick = ()=> exportWeekExcel(b.dataset.exportWeek);
  });
  const btnExportAllExcel = document.getElementById('btnExportAllExcel');
  if (btnExportAllExcel) btnExportAllExcel.onclick = exportAllExcel;
  document.querySelectorAll('[data-del-week-historial]').forEach(b=>{
    b.onclick = ()=>{
      const sem = b.dataset.delWeekHistorial;
      if (!confirm(`Eliminar la semana "${sem}" del historial? Esto no se puede deshacer.`)) return;
      DB.historialNuevo = DB.historialNuevo.filter(h=>h.semana!==sem);
      const w = DB.weeks.find(w=>w.label===sem);
      if (w) w.estado = 'Abierta';
      saveDB(); toast('Semana eliminada del historial'); render();
    };
  });
  const btnBorrarTodoHistorial = document.getElementById('btnBorrarTodoHistorial');
  if (btnBorrarTodoHistorial) btnBorrarTodoHistorial.onclick = ()=>{
    if (!confirm('Esto va a borrar TODAS las semanas, descuentos, ajustes y cierres. Los empleados y codigos de descuento se mantienen. No se puede deshacer. Deseas continuar?')) return;
    exportBackup();
    DB.weeks = [];
    DB.descuentos = [];
    DB.ajustes = [];
    DB.historialNuevo = [];
    saveDB();
    wizardWeekLabel = null;
    toast('Historial puesto en cero. Se descargo un respaldo antes de borrar.');
    currentTab = 'inicio';
    render();
  };

  // ---- Empleados ----
  const btnAddEmp = document.getElementById('btnAddEmp');
  if (btnAddEmp) btnAddEmp.onclick = ()=>{
    const nombre = document.getElementById('newEmpNombre').value.trim();
    const rol = document.getElementById('newEmpRol').value;
    if (!nombre){ toast('Escribe un nombre'); return; }
    DB.employees.push({nombre, rol, activo:true, notas:''});
    saveDB(); toast('Empleado agregado'); render();
  };
  document.querySelectorAll('[data-emp-field]').forEach(el=>{
    el.onchange = ()=>{
      const i = Number(el.dataset.empI); const f = el.dataset.empField;
      DB.employees[i][f] = (f==='activo') ? el.checked : el.value;
      saveDB();
    };
  });
  document.querySelectorAll('[data-del-emp]').forEach(b=>{
    b.onclick = ()=>{ if(!confirm('Eliminar este empleado?')) return; DB.employees.splice(Number(b.dataset.delEmp),1); saveDB(); render(); };
  });

  // ---- Codigos ----
  const btnAddCode = document.getElementById('btnAddCode');
  if (btnAddCode) btnAddCode.onclick = ()=>{
    const codigo = document.getElementById('newCodCodigo').value.trim();
    const descripcion = document.getElementById('newCodDescripcion').value.trim();
    const tipo = document.getElementById('newCodTipo').value;
    const porcentaje = document.getElementById('newCodPorcentaje').value ? Number(document.getElementById('newCodPorcentaje').value) : null;
    if (!codigo){ toast('Escribe un codigo'); return; }
    DB.codes.push({codigo, descripcion, tipo, porcentaje, letra:null, letraSignificado:''});
    saveDB(); toast('Codigo agregado'); render();
  };
  document.querySelectorAll('[data-code-field]').forEach(el=>{
    el.onchange = ()=>{
      const i = Number(el.dataset.codeI); const f = el.dataset.codeField;
      let val = el.value;
      if (f==='porcentaje') val = val===''? null : Number(val);
      DB.codes[i][f] = val;
      if (f==='letra'){ const l = DB.letrasRef.find(x=>x.letra===val); DB.codes[i].letraSignificado = l ? l.significado : ''; }
      saveDB(); render();
    };
  });
  document.querySelectorAll('[data-del-code]').forEach(b=>{
    b.onclick = ()=>{ if(!confirm('Eliminar este codigo?')) return; DB.codes.splice(Number(b.dataset.delCode),1); saveDB(); render(); };
  });

  // ---- Ayuda: respaldo ----
  const ayudaBtnExport = document.getElementById('ayudaBtnExport');
  if (ayudaBtnExport) ayudaBtnExport.onclick = exportBackup;
  const ayudaFileImport = document.getElementById('ayudaFileImport');
  if (ayudaFileImport) ayudaFileImport.onchange = (e)=>{ if(e.target.files[0]) importBackup(e.target.files[0]); };
}

// ---------- Exportar a Excel (ExcelJS, con diseño) ----------
const XL_ESPRESSO = 'FF241A12';
const XL_WOOD = 'FFB06A34';
const XL_WOOD_DARK = 'FF8A4F24';
const XL_CREAM = 'FFF3E8D2';
const XL_ROWALT = 'FFF6F0E4';
const XL_RED = 'FFB03A2E';
const XL_GREEN = 'FF2E7D4F';

function xlThinBorder(){
  return { top:{style:'thin',color:{argb:'FFD8CBB0'}}, left:{style:'thin',color:{argb:'FFD8CBB0'}}, bottom:{style:'thin',color:{argb:'FFD8CBB0'}}, right:{style:'thin',color:{argb:'FFD8CBB0'}} };
}

async function xlDownload(wb, filename){
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function xlAddBrandHeader(ws, sede, subtitulo, span){
  ws.mergeCells(1,1,1,span);
  const c1 = ws.getCell(1,1);
  c1.value = 'CORDOVA - RESTAURANTE PARADOR';
  c1.font = { bold:true, size:15, color:{argb:'FFFFFFFF'} };
  c1.alignment = { horizontal:'center', vertical:'middle' };
  ws.getRow(1).height = 26;
  for (let i=1;i<=span;i++){ ws.getCell(1,i).fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_ESPRESSO} }; }

  ws.mergeCells(2,1,2,span);
  const c2 = ws.getCell(2,1);
  c2.value = `${sede} — ${subtitulo}`;
  c2.font = { bold:true, italic:true, size:11.5, color:{argb:'FFFFFFFF'} };
  c2.alignment = { horizontal:'center', vertical:'middle' };
  ws.getRow(2).height = 20;
  for (let i=1;i<=span;i++){ ws.getCell(2,i).fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_WOOD_DARK} }; }
}

async function exportWeekExcel(label){
  if (typeof ExcelJS==='undefined'){ alert('Se necesita conexion a internet la primera vez que se usa esta funcion.'); return; }
  const calc = calcSemana(label);
  const wb = new ExcelJS.Workbook();
  wb.creator = 'Cordova - Restaurante Parador';
  wb.created = new Date();
  const ws = wb.addWorksheet('Liquidacion', { views:[{ state:'frozen', ySplit:12 }] });
  ws.columns = [ {width:34}, {width:18}, {width:16}, {width:18}, {width:16} ];

  xlAddBrandHeader(ws, SEDE_CONFIG[SEDE].nombre, `Liquidacion de Propinas — ${PW()} ${label}`, 5);

  const resumen = [
    ['Propina General', calc.propinaGeneral],
    ['10% Menaje', calc.menaje],
    ['Ajustes Especiales', calc.ajustesTotal],
    ['Total a Distribuir', calc.totalDistribuir],
    ['Empleados en reparto', calc.nReparto],
    [`Propina por empleado (C/U)`, calc.cu]
  ];
  let r = 4;
  resumen.forEach(([label2, val])=>{
    ws.mergeCells(r,1,r,3);
    const lc = ws.getCell(r,1);
    lc.value = label2; lc.font = { bold:true, color:{argb:XL_ESPRESSO} };
    lc.fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_CREAM} };
    lc.border = xlThinBorder();
    for (let i=2;i<=3;i++){ ws.getCell(r,i).fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_CREAM} }; ws.getCell(r,i).border = xlThinBorder(); }
    ws.mergeCells(r,4,r,5);
    const vc = ws.getCell(r,4);
    vc.value = val;
    vc.numFmt = (typeof val === 'number' && label2.indexOf('empleado')===-1 && label2.indexOf('C/U')===-1) ? '"$"#,##0' : (typeof val==='number' ? (label2.indexOf('Empleados')>-1 ? '0' : '"$"#,##0') : '@');
    vc.font = { bold:true, color:{argb:XL_WOOD_DARK} };
    vc.alignment = { horizontal:'right' };
    vc.border = xlThinBorder();
    ws.getCell(r,5).border = xlThinBorder();
    r++;
  });
  r++; // spacer row

  const headerRowIdx = r;
  const headers = ['Empleado','Propina Base','Descuentos','Total a Pagar','Firma'];
  headers.forEach((h,i)=>{
    const c = ws.getCell(headerRowIdx, i+1);
    c.value = h;
    c.font = { bold:true, color:{argb:'FFFFFFFF'} };
    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_WOOD} };
    c.alignment = { horizontal:'center', vertical:'middle' };
    c.border = xlThinBorder();
  });
  ws.getRow(headerRowIdx).height = 20;
  r++;

  calc.detalle.forEach((d, idx)=>{
    const row = [d.nombre, d.base, d.descuentos, d.total, ''];
    row.forEach((v,i)=>{
      const c = ws.getCell(r, i+1);
      c.value = v;
      c.border = xlThinBorder();
      if (i>=1 && i<=3) c.numFmt = '"$"#,##0';
      if (i===0) c.alignment = { horizontal:'left' };
      if (i>=1) c.alignment = { horizontal:'right' };
      if (idx % 2 === 1) c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_ROWALT} };
    });
    r++;
  });

  const totalRow = r;
  const totales = ['TOTAL', calc.detalle.reduce((s,d)=>s+d.base,0), calc.detalle.reduce((s,d)=>s+d.descuentos,0), calc.detalle.reduce((s,d)=>s+d.total,0), ''];
  totales.forEach((v,i)=>{
    const c = ws.getCell(totalRow, i+1);
    c.value = v;
    c.font = { bold:true, color:{argb:'FFFFFFFF'} };
    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_ESPRESSO} };
    c.border = xlThinBorder();
    if (i>=1 && i<=3) c.numFmt = '"$"#,##0';
    if (i>=1) c.alignment = { horizontal:'right' };
  });

  ws.autoFilter = { from:{row:headerRowIdx, column:1}, to:{row:headerRowIdx, column:5} };

  await xlDownload(wb, `Cordova_Propinas_${label.replace(/[^0-9a-zA-Z]/g,'_')}.xlsx`);
}

async function exportAllExcel(){
  if (typeof ExcelJS==='undefined'){ alert('Se necesita conexion a internet la primera vez que se usa esta funcion.'); return; }
  const wb = new ExcelJS.Workbook();
  wb.creator = 'Cordova - Restaurante Parador';
  wb.created = new Date();
  const ws = wb.addWorksheet('Historial', { views:[{ state:'frozen', ySplit:3 }] });
  ws.columns = [ {width:24}, {width:30}, {width:16}, {width:14}, {width:16}, {width:14} ];

  xlAddBrandHeader(ws, SEDE_CONFIG[SEDE].nombre, 'Historial de Liquidaciones', 6);

  const headerRowIdx = 3;
  const headers = ['Semana','Empleado','Propina Base','Descuentos','Total Pagado','Fecha de Cierre'];
  headers.forEach((h,i)=>{
    const c = ws.getCell(headerRowIdx, i+1);
    c.value = h;
    c.font = { bold:true, color:{argb:'FFFFFFFF'} };
    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_WOOD} };
    c.alignment = { horizontal:'center', vertical:'middle' };
    c.border = xlThinBorder();
  });
  ws.getRow(headerRowIdx).height = 20;

  let r = headerRowIdx+1;
  DB.historialNuevo.forEach((h, idx)=>{
    const row = [h.semana, h.empleado, h.propinaBase, h.descuentos, h.total, h.fechaCierre];
    row.forEach((v,i)=>{
      const c = ws.getCell(r, i+1);
      c.value = v;
      c.border = xlThinBorder();
      if (i>=2 && i<=4) c.numFmt = '"$"#,##0';
      if (i>=2) c.alignment = { horizontal:'right' };
      if (idx % 2 === 1) c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:XL_ROWALT} };
    });
    r++;
  });

  ws.autoFilter = { from:{row:headerRowIdx, column:1}, to:{row:headerRowIdx, column:6} };

  await xlDownload(wb, `Cordova_Propinas_Historial_${fmtDate(new Date())}.xlsx`);
}

// ---------- Respaldo JSON ----------
function exportBackup(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `cordova_propinas_backup_${fmtDate(new Date())}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  toast('Copia de seguridad descargada');
}
function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try {
      const data = JSON.parse(e.target.result);
      if (!data.employees || !data.codes) throw new Error('formato invalido');
      DB = data; saveDB(); toast('Datos importados correctamente'); render();
    } catch(err){ alert('No se pudo importar el archivo: ' + err.message); }
  };
  reader.readAsText(file);
}

function setupGlobalDelegation(){
  document.addEventListener('click', function(e){
    const t = e.target;
    if (!t) return;
    if (t.id==='btnUsarSugerido'){
      const el = document.getElementById('dValor'); if (el) el.value = t.dataset.val;
    }
    if (t.id==='btnCalcPct'){
      const pct = Number(document.getElementById('aPorcentaje').value)||0;
      const cuBase = calcCuBase(wizardWeekLabel);
      const val = Math.round(cuBase*pct/100);
      document.getElementById('aResultado').innerHTML = `${pct}% de ${money(cuBase)} = <strong>${money(val)}</strong> <button class="btn-ghost" type="button" data-usar-ajuste="${val}">Usar este valor</button>`;
    }
    if (t.id==='btnCalcDias'){
      const dias = Number(document.getElementById('aDias').value)||0;
      const cuBase = calcCuBase(wizardWeekLabel);
      const nDias = diasEnPeriodo(wizardWeekLabel);
      const valorDia = cuBase/nDias;
      const val = Math.round(valorDia*dias);
      document.getElementById('aResultado').innerHTML = `${dias} dia(s) x ${money(valorDia)} = <strong>${money(val)}</strong> <button class="btn-ghost" type="button" data-usar-ajuste="${val}">Usar este valor</button>`;
    }
    if (t.id==='btnCalcHoras'){
      const horasEst = Number(document.getElementById('aHorasEstandar').value)||8;
      const horas = Number(document.getElementById('aHoras').value)||0;
      const cuBase = calcCuBase(wizardWeekLabel);
      const nDias = diasEnPeriodo(wizardWeekLabel);
      const valorHora = horasEst>0 ? (cuBase/nDias)/horasEst : 0;
      const val = Math.round(valorHora*horas);
      document.getElementById('aResultado').innerHTML = `${horas} hora(s) x ${money(valorHora)} = <strong>${money(val)}</strong> <button class="btn-ghost" type="button" data-usar-ajuste="${val}">Usar este valor</button>`;
    }
    if (t.dataset && t.dataset.usarAjuste){
      const el = document.getElementById('aValor'); if (el) el.value = t.dataset.usarAjuste;
    }
  });
  document.addEventListener('change', function(e){
    if (e.target && e.target.id==='aHorasEstandar'){ updateHorasInfo(); }
  });
}

function refreshSedeLabels(){
  const navWizard = document.querySelector('.nav-item[data-tab="wizard"]');
  if (navWizard) navWizard.textContent = 'Liquidar ' + PW();
  const sedeBadge = document.getElementById('sedeBadge');
  if (sedeBadge) sedeBadge.textContent = 'Sede: ' + SEDE_CONFIG[SEDE].nombre;
}

async function intentarEntrar(){
  const clave = document.getElementById('claveInput').value;
  if (!intentarAcceso(clave)){
    document.getElementById('claveError').style.display = 'block';
    return;
  }
  document.getElementById('claveError').style.display = 'none';
  const btn = document.getElementById('btnEntrar');
  btn.disabled = true; btn.textContent = 'Cargando...';
  try {
    await cargarDatosSede();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('layout').style.display = 'flex';
    refreshSedeLabels();
    render();
  } catch(err){
    console.error(err);
    document.getElementById('claveError').textContent = 'Error de conexion, intenta de nuevo.';
    document.getElementById('claveError').style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

document.getElementById('btnEntrar').onclick = intentarEntrar;
document.getElementById('claveInput').onkeydown = (e)=>{ if (e.key==='Enter') intentarEntrar(); };
document.getElementById('navCambiarSede').onclick = cerrarSesion;
document.getElementById('navSalirFirebase').onclick = ()=> window.fbLogoutPropinas && window.fbLogoutPropinas();

setupGlobalDelegation();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB5cI5TFAhy3DveiwQFjAORSroo45P29d8",
    authDomain: "controlcord.firebaseapp.com",
    projectId: "controlcord",
    storageBucket: "controlcord.firebasestorage.app",
    messagingSenderId: "475286348786",
    appId: "1:475286348786:web:6228eb68cc61af6f74016b"
  };
  const fbApp = initializeApp(firebaseConfig);
  const auth = getAuth(fbApp);
  const db = getFirestore(fbApp);

  let lastSentAt = {};
  let unsub = null;

  window.fbPropinas = {
    async loadSede(sede, seed){
      const ref = doc(db, "restaurante_apps", "propinas_" + sede);
      const snap = await getDoc(ref);
      if (snap.exists()) return snap.data();
      const fresh = JSON.parse(JSON.stringify(seed));
      fresh.updatedAt = Date.now();
      lastSentAt[sede] = fresh.updatedAt;
      await setDoc(ref, fresh);
      return fresh;
    },
    saveSede(sede, data){
      data.updatedAt = Date.now();
      lastSentAt[sede] = data.updatedAt;
      const ref = doc(db, "restaurante_apps", "propinas_" + sede);
      setDoc(ref, data).catch(err=> console.error('Error guardando propinas en la nube', err));
    },
    watchSede(sede, cb){
      if (unsub) unsub();
      const ref = doc(db, "restaurante_apps", "propinas_" + sede);
      unsub = onSnapshot(ref, (snap)=>{
        if (!snap.exists()) return;
        const data = snap.data();
        if (data.updatedAt === lastSentAt[sede]) return; // eco de nuestro propio guardado
        cb(data);
      }, (err)=> console.error('Error escuchando cambios de propinas', err));
    },
    stopWatch(){
      if (unsub){ unsub(); unsub = null; }
    }
  };

  const overlay = document.getElementById('fb-login-overlay');
  const loginScreen = document.getElementById('loginScreen');
  const form = document.getElementById('fb-login-form');
  const errBox = document.getElementById('fb-login-error');
  const btn = document.getElementById('fb-login-btn');

  onAuthStateChanged(auth, (user)=>{
    if (user){
      overlay.style.display = 'none';
      loginScreen.style.display = 'flex';
    } else {
      overlay.style.display = 'flex';
      loginScreen.style.display = 'none';
      document.getElementById('layout').style.display = 'none';
    }
  });

  form.addEventListener('submit', (e)=>{
    e.preventDefault();
    errBox.textContent = '';
    btn.disabled = true; btn.textContent = 'Entrando...';
    const email = document.getElementById('fb-login-email').value.trim();
    const pass = document.getElementById('fb-login-pass').value;
    signInWithEmailAndPassword(auth, email, pass)
      .catch(()=>{ errBox.textContent = 'Correo o contrasena incorrectos.'; })
      .finally(()=>{ btn.disabled = false; btn.textContent = 'Entrar'; });
  });

  window.fbLogoutPropinas = ()=> signOut(auth);
</script>
